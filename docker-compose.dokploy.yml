# ============================================================
# Brainwave EduSys — Dokploy Deployment
#
# Differences from docker-compose.prod.yml:
#   - No Caddy service (Dokploy uses Traefik built-in)
#   - Frontend + Backend have Traefik labels for routing
#   - Services join dokploy-network so Traefik can reach them
#   - Internal services (MySQL, Redis) stay on private network
# ============================================================

services:
  # ---- MySQL Database ----
  mysql:
    image: mysql:8.0
    container_name: brainwave-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/docker/mysql/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - brainwave-internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: brainwave-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brainwave-internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: brainwave-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      API_PORT: 4000
      API_HOST: 0.0.0.0
      API_URL: https://${API_DOMAIN}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN}
      MASTER_EMAIL: ${MASTER_EMAIL}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      MASTER_NAME: ${MASTER_NAME}
      UPLOAD_DIR: /app/data/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-5}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@brainwave.edu}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - upload_data:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - brainwave-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brainwave-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.brainwave-backend.entrypoints=websecure"
      - "traefik.http.routers.brainwave-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.brainwave-backend.loadbalancer.server.port=4000"
      - "traefik.docker.network=dokploy-network"
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- Worker Service ----
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: brainwave-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@brainwave.edu}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brainwave-internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- Frontend ----
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: https://${API_DOMAIN}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
        VITE_APP_NAME: ${APP_NAME:-Brainwave EduSys}
    container_name: brainwave-frontend
    restart: unless-stopped
    networks:
      - brainwave-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brainwave-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.brainwave-frontend.entrypoints=websecure"
      - "traefik.http.routers.brainwave-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.brainwave-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  brainwave-internal:
    driver: bridge
  dokploy-network:
    external: true
